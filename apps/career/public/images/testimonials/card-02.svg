<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E2B6B"/>
      <stop offset="100%" stop-color="#8B5EDB"/>
    </linearGradient>
    <pattern id="lines" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="28" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1200" height="800" rx="36" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="800" rx="36" fill="url(#lines)"/>
  <text x="70" y="140" fill="white" opacity="0.6" font-size="28" font-family="Arial, sans-serif" letter-spacing="4">SUCCESS</text>
  <text x="220" y="140" fill="white" opacity="0.6" font-size="28" font-family="Arial, sans-serif" letter-spacing="4">STORY</text>
  <text x="90" y="700" fill="white" opacity="0.12" font-size="120" font-family="Georgia, serif">02</text>
</svg>
